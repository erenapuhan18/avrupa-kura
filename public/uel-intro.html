<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Europa League — Giriş</title>
<style>:root{--font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;} html,body{margin:0;padding:0;}</style>
</head>
<body>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .scene { width:100%; height:100vh; min-height:520px; position:relative; overflow:hidden; background:#1a0800; font-family:var(--font-sans); }
  .hero { position:absolute; inset:0; }
  .bg-img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:0; transform:scale(1.1); transition:opacity 1.8s ease, transform 7s ease; }
  .bg-img.visible { opacity:1; transform:scale(1); }
  .overlay { position:absolute; inset:0; background:linear-gradient(to bottom, rgba(20,5,0,0.25) 0%, rgba(20,5,0,0.45) 55%, rgba(15,4,0,0.88) 100%); }
  .logo-wrap { position:absolute; top:50%; left:50%; z-index:2; display:flex; flex-direction:column; align-items:center; gap:14px; opacity:0; transform:translate(-50%,calc(-50% + 28px)); transition:opacity 1.2s ease 1.6s, transform 1.2s ease 1.6s; }
  .logo-wrap.visible { opacity:1; transform:translate(-50%,-50%); }
  .uel-badge svg { width:84px; height:108px; filter:drop-shadow(0 0 22px rgba(255,120,30,0.6)); }
  .divider { width:50px; height:1px; background:rgba(255,160,80,0.5); }
  .tagline { color:rgba(255,200,160,0.8); font-size:11px; letter-spacing:0.3em; text-transform:uppercase; }
  .title-main { color:#fff; font-size:30px; font-weight:500; letter-spacing:0.12em; text-align:center; text-shadow:0 2px 24px rgba(40,10,0,0.95); }
  .scroll-hint { position:absolute; bottom:34px; left:50%; transform:translateX(-50%); z-index:3; display:flex; flex-direction:column; align-items:center; gap:8px; opacity:0; transition:opacity 0.8s ease 3s; cursor:pointer; }
  .scroll-hint.visible { opacity:1; }
  .scroll-hint span { color:rgba(255,190,150,0.7); font-size:11px; letter-spacing:0.2em; text-transform:uppercase; }
  .arrow-down { width:20px; height:20px; border-right:1.5px solid rgba(255,170,100,0.6); border-bottom:1.5px solid rgba(255,170,100,0.6); transform:rotate(45deg); animation:bounce 1.5s infinite; }
  @keyframes bounce { 0%,100%{transform:rotate(45deg) translateY(0);} 50%{transform:rotate(45deg) translateY(5px);} }
  .content { background:#160600; color:#fff; padding:80px 32px; opacity:0; transform:translateY(36px); transition:opacity 0.9s ease, transform 0.9s ease; }
  .content.visible { opacity:1; transform:translateY(0); }
  .inner { max-width:560px; margin:0 auto; text-align:center; }
  .crown { font-size:40px; margin-bottom:10px; }
  .subtitle { font-size:12px; letter-spacing:0.22em; color:#ff9d4d; text-transform:uppercase; margin-bottom:8px; }
  .inner h2 { font-size:24px; font-weight:500; color:#fff; letter-spacing:0.04em; margin-bottom:6px; }
  .inner p { font-size:14px; color:rgba(255,255,255,0.55); line-height:1.85; }
  .titles-num { font-size:64px; font-weight:600; color:#fff; line-height:1; margin:32px 0 4px; text-shadow:0 0 30px rgba(255,130,40,0.5); }
  .titles-label { font-size:11px; letter-spacing:0.18em; color:rgba(255,200,160,0.5); text-transform:uppercase; }
  .stats { display:flex; justify-content:center; gap:40px; margin-top:44px; flex-wrap:wrap; }
  .stat span:first-child { display:block; font-size:26px; font-weight:500; color:#fff; }
  .stat span:last-child { display:block; font-size:10px; letter-spacing:0.14em; color:rgba(255,200,160,0.45); text-transform:uppercase; margin-top:4px; }
</style>
