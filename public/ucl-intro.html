<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Champions League — Giriş</title>
<style>:root{--font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;} html,body{margin:0;padding:0;}</style>
</head>
<body>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .scene { width:100%; height:100vh; min-height:520px; position:relative; overflow:hidden; background:#02020f; font-family:var(--font-sans); }
  .hero { position:absolute; inset:0; }
  .bg-img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:0; transform:scale(1.1); transition:opacity 1.8s ease, transform 7s ease; }
  .bg-img.visible { opacity:1; transform:scale(1); }
  .overlay { position:absolute; inset:0; background:linear-gradient(to bottom, rgba(2,2,25,0.15) 0%, rgba(2,2,25,0.4) 55%, rgba(2,2,25,0.85) 100%); }
  .logo-wrap { position:absolute; top:50%; left:50%; z-index:2; display:flex; flex-direction:column; align-items:center; gap:14px; opacity:0; transform:translate(-50%,calc(-50% + 28px)); transition:opacity 1.2s ease 1.6s, transform 1.2s ease 1.6s; }
  .logo-wrap.visible { opacity:1; transform:translate(-50%,-50%); }
  .ucl-badge svg { width:96px; height:96px; filter:drop-shadow(0 0 20px rgba(80,140,255,0.6)); }
  .divider { width:50px; height:1px; background:rgba(255,255,255,0.4); }
  .tagline { color:rgba(255,255,255,0.7); font-size:11px; letter-spacing:0.3em; text-transform:uppercase; }
  .title-main { color:#fff; font-size:30px; font-weight:500; letter-spacing:0.12em; text-align:center; text-shadow:0 2px 24px rgba(0,0,40,0.95); }
  .scroll-hint { position:absolute; bottom:34px; left:50%; transform:translateX(-50%); z-index:3; display:flex; flex-direction:column; align-items:center; gap:8px; opacity:0; transition:opacity 0.8s ease 3s; cursor:pointer; }
  .scroll-hint.visible { opacity:1; }
  .scroll-hint span { color:rgba(255,255,255,0.6); font-size:11px; letter-spacing:0.2em; text-transform:uppercase; }
  .arrow-down { width:20px; height:20px; border-right:1.5px solid rgba(255,255,255,0.55); border-bottom:1.5px solid rgba(255,255,255,0.55); transform:rotate(45deg); animation:bounce 1.5s infinite; }
  @keyframes bounce { 0%,100%{transform:rotate(45deg) translateY(0);} 50%{transform:rotate(45deg) translateY(5px);} }
  .content { background:#080818; color:#fff; padding:80px 32px; opacity:0; transform:translateY(36px); transition:opacity 0.9s ease, transform 0.9s ease; }
  .content.visible { opacity:1; transform:translateY(0); }
  .inner { max-width:560px; margin:0 auto; text-align:center; }
  .accent { width:2px; height:36px; background:rgba(100,150,255,0.4); margin:0 auto 28px; }
  .inner h2 { font-size:20px; font-weight:500; color:#8ab8ff; letter-spacing:0.06em; margin-bottom:14px; }
  .inner p { font-size:14px; color:rgba(255,255,255,0.55); line-height:1.85; }
  .stats { display:flex; justify-content:center; gap:48px; margin-top:44px; }
  .stat span:first-child { display:block; font-size:30px; font-weight:500; color:#fff; }
  .stat span:last-child { display:block; font-size:10px; letter-spacing:0.16em; color:rgba(255,255,255,0.4); text-transform:uppercase; margin-top:4px; }
</style>
