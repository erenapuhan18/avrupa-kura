<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>UEFA Presents</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{ --ink:#f4f7fb; --muted:#8c95a4; --blue:#3a8bff; }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
  body{background:#000;color:var(--ink);font-family:"Oswald",system-ui,sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased}

  /* ---------- SCROLL STAGE ---------- */
  .wrap{position:relative;height:340svh}
  .stage{position:sticky;top:0;height:100svh;min-height:560px;overflow:hidden;background:#000}

  .photo{
    position:absolute;inset:0;width:100%;height:100%;
    object-fit:cover;object-position:center;
    transform:scale(1.12);
    will-change:transform;
  }
  /* darkening scrim that lifts as you scroll */
  .scrim{
    position:absolute;inset:0;pointer-events:none;
    background:
      radial-gradient(120% 90% at 50% 42%,rgba(0,0,0,0) 30%,rgba(0,0,0,.55) 100%),
      linear-gradient(180deg,rgba(0,0,0,.72) 0%,rgba(0,0,0,.28) 38%,rgba(0,0,0,.30) 72%,rgba(0,0,0,.85) 100%);
  }
  /* subtle top fade so the title always reads */
  .topfade{position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(180deg,rgba(0,0,0,.55),transparent 30%)}

  /* ---------- TITLE ---------- */
  .title{
    position:absolute;left:0;right:0;top:30%;
    display:flex;flex-direction:column;align-items:center;text-align:center;
    padding:0 24px;will-change:transform,opacity;
  }
  .eyebrow{
    font-weight:200;letter-spacing:.66em;text-indent:.66em;
    font-size:clamp(13px,3.6vw,20px);color:#cfd6e0;
    opacity:0;transform:translateY(8px);
    animation:rise 1.1s .3s cubic-bezier(.2,.7,.2,1) forwards;
  }
  .present{
    font-weight:300;letter-spacing:.32em;text-indent:.32em;
    font-size:clamp(42px,14vw,116px);line-height:1;margin-top:16px;
    background:linear-gradient(180deg,#ffffff 0%,#d6dde7 55%,#9aa4b3 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 2px 40px rgba(0,0,0,.5);
    opacity:0;transform:translateY(14px);
    animation:rise 1.3s .6s cubic-bezier(.2,.7,.2,1) forwards;
  }
  .rule{width:0;height:1px;margin-top:26px;
    background:linear-gradient(90deg,transparent,var(--blue),transparent);
    box-shadow:0 0 16px var(--blue);
    animation:rule 1.4s 1.15s cubic-bezier(.2,.7,.2,1) forwards}

  /* ---------- SCROLL HINT ---------- */
  .hint{position:absolute;left:0;right:0;bottom:max(26px,env(safe-area-inset-bottom));
    display:flex;flex-direction:column;align-items:center;gap:11px;
    will-change:opacity;opacity:0;animation:fade 1s 1.7s forwards}
  .hint span{font-weight:300;letter-spacing:.34em;text-indent:.34em;font-size:11px;color:var(--muted)}
  .chev{width:16px;height:16px;border-right:1.5px solid var(--muted);border-bottom:1.5px solid var(--muted);
    transform:rotate(45deg);animation:bob 1.8s ease-in-out infinite}

  /* ---------- TAGLINE (revealed late) ---------- */
  .tagline{position:absolute;left:0;right:0;bottom:14%;text-align:center;padding:0 24px;
    will-change:transform,opacity;opacity:0}
  .tagline .marks{display:flex;gap:16px;justify-content:center;margin-bottom:16px}
  .dot{width:8px;height:8px;border-radius:50%}
  .dot.o{background:#ff7a18;box-shadow:0 0 12px #ff7a18}
  .dot.b{background:#3a8bff;box-shadow:0 0 12px #3a8bff}
  .dot.g{background:#16d977;box-shadow:0 0 12px #16d977}
  .tagline h2{font-weight:300;font-size:clamp(22px,6.5vw,40px);letter-spacing:.05em;line-height:1.18;
    background:linear-gradient(180deg,#fff,#aeb7c4);-webkit-background-clip:text;background-clip:text;color:transparent}
  .tagline h2 b{font-weight:500}

  /* ---------- OUTRO ---------- */
  .outro{min-height:60svh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;gap:14px;padding:0 26px 70px;background:#000}
  .outro p{color:var(--muted);letter-spacing:.34em;text-indent:.34em;font-size:12px;font-weight:300}

  @keyframes rise{to{opacity:1;transform:translateY(0)}}
  @keyframes fade{to{opacity:1}}
  @keyframes rule{to{width:min(220px,52vw)}}
  @keyframes bob{0%,100%{transform:rotate(45deg) translate(0,0)}50%{transform:rotate(45deg) translate(3px,3px)}}

  @media (prefers-reduced-motion:reduce){
    html{scroll-behavior:auto}
    *{animation:none!important}
    .eyebrow,.present,.hint{opacity:1!important;transform:none!important}
    .rule{width:min(220px,52vw)!important}
    .photo{transform:scale(1)!important}
    .scrim{opacity:.25!important}
  }
</style>
</head>

<script>
(function(){
  var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var wrap=document.querySelector('.wrap');
  var photo=document.getElementById('photo');
  var scrim=document.getElementById('scrim');
  var title=document.getElementById('title');
  var hint=document.getElementById('hint');
  var tagline=document.getElementById('tagline');

  function clamp(v,a,b){return Math.min(b,Math.max(a,v));}
  function ramp(p,a,b){return clamp((p-a)/(b-a),0,1);}
  function ease(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}

  function apply(p){
    // photo: slow zoom-out + slight parallax up
    var z=1.12-0.12*ease(ramp(p,0,0.6));
    var py=-(ease(ramp(p,0,1))*4);
    photo.style.transform='scale('+z+') translateY('+py+'%)';

    // scrim lifts -> scene brightens
    scrim.style.opacity = 1-ease(ramp(p,0.08,0.45));

    // title drifts up and fades
    var tp=ease(ramp(p,0.12,0.42));
    title.style.opacity=1-tp;
    title.style.transform='translateY('+(-46*tp)+'px)';

    // hint disappears immediately
    hint.style.opacity=1-ease(ramp(p,0.02,0.12));

    // tagline appears late, then eases away at very end
    var tg=ease(ramp(p,0.62,0.82))*(1-ease(ramp(p,0.92,1)));
    tagline.style.opacity=tg;
    tagline.style.transform='translateY('+(14*(1-tg))+'px)';
  }

  if(reduce){ scrim.style.opacity=.25; title.style.opacity=1; tagline.style.opacity=1; return; }

  var ticking=false;
  function onScroll(){
    if(ticking)return; ticking=true;
    requestAnimationFrame(function(){
      var r=wrap.getBoundingClientRect();
      var total=wrap.offsetHeight-window.innerHeight;
      var p=clamp(-r.top/total,0,1);
      apply(p); ticking=false;
    });
  }
  window.addEventListener('scroll',onScroll,{passive:true});
  window.addEventListener('resize',onScroll);
  apply(0);
})();
</script>
<script>
  /* avrupa-kura: dibe yaklaşınca (limit bitmeden) ya da tuşla geçiş sinyali */
  (function(){
    var sent=false;
    function go(){ if(sent) return; sent=true; try{ parent.postMessage("intro-enter","*"); }catch(e){} }
    addEventListener("scroll", function(){
      if(window.scrollY + window.innerHeight >= document.documentElement.scrollHeight - 110) go();
    }, { passive:true });
    addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key==="Escape"||e.key===" "||e.key==="ArrowDown") go(); });
  })();
</script>
